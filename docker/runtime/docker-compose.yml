services:
  dev:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    tty: true
    stdin_open: true

  server:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    command: ["bash", "-lc", "mkdir -p build-linux && make -C app/server BUILD_DIR=../../build-linux && ./build-linux/server ${SERVER_PORT:-9090}"]
    volumes:
      - ../..:/workspace
    environment:
      SERVER_PORT: ${SERVER_PORT:-9090}
    networks:
      - chatnet

  client:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    command: ["bash", "-lc", "mkdir -p build-linux && make -C app/client BUILD_DIR=../../build-linux && ./build-linux/client server ${SERVER_PORT:-9090} ${DEVICE_PATH:-/dev/device}"]
    volumes:
      - ../..:/workspace
      - /dev:/dev
    environment:
      SERVER_PORT: ${SERVER_PORT:-9090}
      DEVICE_PATH: ${DEVICE_PATH:-/dev/device}
      PROCESSING_MODE: ${PROCESSING_MODE:-substitution}
    networks:
      - chatnet
    depends_on:
      - server

  module-ops:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspace
    command: ["bash"]
    privileged: true
    volumes:
      - ../..:/workspace
      - /lib/modules:/lib/modules
      - /dev:/dev
      - ${KERNEL_BUILD_DIR:-${KERNEL_CACHE_DIR:-../..}/.kernel-build/${KERNEL_RELEASE:-unknown}}:/kernel-build
    environment:
      KERNEL_MODULE_NAME: ${KERNEL_MODULE_NAME:-chat_driver}
      DEVICE_PATH: ${DEVICE_PATH:-/dev/device}
      KERNEL_BUILD_DIR: ${KERNEL_BUILD_DIR:-}
      KERNEL_CACHE_ROOT: /workspace/.kernel-build
      MODULE_PATH: ${MODULE_PATH:-}
    networks:
      - chatnet

networks:
  chatnet:
    driver: bridge
